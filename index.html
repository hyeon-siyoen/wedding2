<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
    }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background-color: #f4f8fc;
      margin: 0;
      padding: 20px 16px 60px;
      color: #2d3b4d;
    }
    .card {
      max-width: 460px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 0 0 24px;
      box-shadow: 0 4px 24px rgba(45,68,104,0.16);
      overflow: hidden;
    }
    .banner {
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: center 30%;
      display: block;
      background: #f4f8fc;
    }
    .card-body {
      padding: 20px 20px 0;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      margin: 0 0 4px;
      color: #2d4468;
    }
    p.sub {
      text-align: center;
      font-size: 14px;
      line-height: 1.7;
      color: #4a678f;
      margin: 0 0 20px;
    }
    .tabs {
      display: flex;
      background: #eaf1fa;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #7c93ad;
    }
    .tab.active { background: #fff; color: #2d4468; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 16px 0 6px;
      color: #2d4468;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d7e6f5;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
    }
    textarea { min-height: 90px; }
    .file-wrap {
      border: 2px dashed #d7e6f5;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-top: 6px;
    }
    .file-wrap.has-file { border-color: #3f6fa8; background: #eef5fc; }
    #fileName { font-size: 13px; color: #2d4468; margin-top: 10px; word-break: break-all; }
    #fileInput { display: none; }
    .file-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #eaf1fa;
      color: #2d4468;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    button.submitBtn {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #3f6fa8;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { background: #b9cbe0; }
    #status {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }
    .ok { color: #5a8a5c; }
    .err { color: #c0554a; }

    /* 갤러리 - 썸네일 그리드 */
    #galleryGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .thumb {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      overflow: hidden;
      background: #eaf1fa;
      cursor: pointer;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb.no-media {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      text-align: center;
    }
    .thumb.no-media .msg-preview {
      font-size: 11px;
      color: #2d4468;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
    }
    .thumb .play-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 32px; height: 32px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb .play-icon::after {
      content: '';
      border-style: solid;
      border-width: 6px 0 6px 10px;
      border-color: transparent transparent transparent #fff;
      margin-left: 2px;
    }
    .thumb .name-tag {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      color: #fff;
      font-size: 10px;
      padding: 12px 6px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #galleryEmpty { text-align: center; color: #7c93ad; font-size: 14px; padding: 30px 0; }
    #refreshBtn {
      display: block;
      margin: 0 auto 14px;
      background: none;
      border: 1px solid #d7e6f5;
      color: #2d4468;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
    }
    #loadMoreBtn {
      display: block;
      margin: 16px auto 0;
      background: #eaf1fa;
      border: none;
      color: #2d4468;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    #loadMoreBtn:disabled { opacity: 0.5; }

    /* 모달 (크게 보기) */
    #modalOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,14,12,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #modalOverlay.open { display: flex; }
    #modalBox {
      background: #fff;
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
    }
    #modalMedia { width: 100%; background: #000; }
    #modalMedia img { width: 100%; display: block; }
    #modalMedia iframe { width: 100%; height: 280px; display: block; border: none; }
    #modalBody { padding: 16px 18px 20px; }
    #modalClose {
      position: absolute;
      top: 10px; right: 10px;
      width: 34px; height: 34px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      z-index: 1000;
    }
  </style>
</head>

      document.getElementById('tabGallery').classList.toggle('active', tab === 'gallery');
      document.getElementById('tabCouple').classList.toggle('active', tab === 'couple');
      document.getElementById('writeView').style.display = tab === 'write' ? 'block' : 'none';
      document.getElementById('galleryView').style.display = tab === 'gallery' ? 'block' : 'none';
      document.getElementById('coupleView').style.display = tab === 'couple' ? 'block' : 'none';
      if (tab === 'gallery' && !galleryLoadedOnce) loadGallery(true);
      if (tab === 'couple' && !coupleLoadedOnce) loadCouplePhotos();
    }

    fileInput.addEventListener('change', () => {
      const files = Array.from(fileInput.files || []);
      if (files.length === 0) {
        fileNameEl.textContent = '';
        fileWrap.classList.remove('has-file');
        return;
      }

      if (files.length > MAX_FILES) {
        alert('한 번에 최대 ' + MAX_FILES + '개까지 선택할 수 있어요.');
        fileInput.value = '';
        fileNameEl.textContent = '';
        fileWrap.classList.remove('has-file');
        return;
      }

      const tooBig = files.find(function(f) { return f.size > MAX_SIZE_MB * 1024 * 1024; });
      if (tooBig) {
        alert('파일이 너무 큽니다 (최대 ' + MAX_SIZE_MB + 'MB): ' + tooBig.name + '\n영상은 짧게 촬영하거나 압축 후 올려주세요.');
        fileInput.value = '';
        fileNameEl.textContent = '';
        fileWrap.classList.remove('has-file');
        return;
      }

      if (files.length === 1) {
        fileNameEl.textContent = '선택됨: ' + files[0].name + ' (' + (files[0].size/1024/1024).toFixed(1) + 'MB)';
      } else {
        fileNameEl.textContent = '선택됨: ' + files.length + '개 파일';
      }
      fileWrap.classList.add('has-file');
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // 사진은 업로드 전 자동으로 리사이즈/압축 (용량 줄여서 업로드 안정성 향상)
    function compressImage(file, maxDimension, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = (e) => { img.src = e.target.result; };
        reader.onerror = reject;

        img.onload = () => {
          let { width, height } = img;
          if (width > maxDimension || height > maxDimension) {
            if (width > height) {
              height = Math.round(height * (maxDimension / width));
              width = maxDimension;
            } else {
              width = Math.round(width * (maxDimension / height));
              height = maxDimension;
            }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob(blob => {
            if (!blob) { reject(new Error('압축 실패')); return; }
            resolve(blob);
          }, 'image/jpeg', quality);
        };
        img.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function submitForm() {
      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();
      const files = Array.from(fileInput.files || []);

      if (!message && files.length === 0) {
        statusEl.className = 'err';
        statusEl.textContent = '메시지나 사진/영상을 하나 이상 입력해주세요.';
        return;
      }

      submitBtn.disabled = true;
      statusEl.className = '';

      try {
        if (files.length === 0) {
          statusEl.textContent = '전송 중입니다... 📤';
          await submitOneEntry({ name: name, message: message, fileData: '', fileName: '', mimeType: '' });
        } else {
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            let payload = {
              name: name,
              message: i === 0 ? message : '',
              fileData: '', fileName: '', mimeType: ''
            };

            if (file.type && file.type.startsWith('image/')) {
              statusEl.textContent = '사진 준비 중 (' + (i+1) + '/' + files.length + ')... 📸';
              const compressed = await compressImage(file, 1600, 0.82);
              payload.fileData = await fileToBase64(compressed);
              payload.fileName = file.name.replace(/\.[^.]+$/, '') + '.jpg';
              payload.mimeType = 'image/jpeg';
            } else {
              statusEl.textContent = '영상 준비 중 (' + (i+1) + '/' + files.length + ')... 🎬';
              payload.fileData = await fileToBase64(file);
              payload.fileName = file.name;
              payload.mimeType = file.type || 'application/octet-stream';
            }

            statusEl.textContent = '전송 중 (' + (i+1) + '/' + files.length + ')... 📤';
            await submitOneEntry(payload);
          }
        }

        submitBtn.disabled = false;
        statusEl.className = 'ok';
        statusEl.textContent = '전달되었습니다! 축하해주셔서 감사합니다 💕';
        document.getElementById('name').value = '';
        document.getElementById('message').value = '';
        fileInput.value = '';
        fileNameEl.textContent = '';
        fileWrap.classList.remove('has-file');
      } catch (e) {
        onFailure(e);
      }
    }

    // 서버 호출 1건을 Promise로 감싸고, 25초 넘게 걸리면 타임아웃 처리
    function submitOneEntry(payload) {
      const controller = new AbortController();
      const timeoutId = setTimeout(function() { controller.abort(); }, 25000);

      return fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'submitEntry', data: payload }),
        signal: controller.signal
      })
        .then(function(res) { return res.json(); })
        .then(function(res) {
          clearTimeout(timeoutId);
          if (res && res.success) return res;
          throw new Error((res && res.error) || '알 수 없는 오류');
        })
        .catch(function(err) {
          clearTimeout(timeoutId);
          if (err && err.name === 'AbortError') {
            throw new Error('업로드가 너무 오래 걸려요. 인터넷 연결을 확인하고 다시 시도해주세요.');
          }
          throw err;
        });
    }

    function onFailure(err) {
      submitBtn.disabled = false;
      statusEl.className = 'err';
      statusEl.textContent = '전송 실패: ' + (err && err.message ? err.message : err);
    }

    // ---------- 갤러리 (썸네일 그리드 + 페이지네이션) ----------
    const PAGE_SIZE = 24;
    let galleryOffset = 0;
    let galleryTotal = 0;
    let galleryLoadedOnce = false;

    function loadGallery(reset) {
      const gridEl = document.getElementById('galleryGrid');
      const emptyEl = document.getElementById('galleryEmpty');
      const moreBtn = document.getElementById('loadMoreBtn');

      if (reset) {
        galleryOffset = 0;
        gridEl.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#7c93ad;font-size:13px;padding:20px 0;">불러오는 중...</div>';
        emptyEl.style.display = 'none';
        moreBtn.style.display = 'none';
      } else {
        moreBtn.disabled = true;
        moreBtn.textContent = '불러오는 중...';
      }

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getEntries', data: { offset: galleryOffset, limit: PAGE_SIZE } })
      })
        .then(function(r) { return r.json(); })
        .then(function(res) { onGalleryLoaded(res, reset); })
        .catch(function() {
          if (reset) gridEl.innerHTML = '';
          emptyEl.style.display = 'block';
          emptyEl.textContent = '불러오기에 실패했습니다. 새로고침을 눌러주세요.';
          moreBtn.disabled = false;
          moreBtn.textContent = '더 보기';
        });
    }

    function onGalleryLoaded(res, reset) {
      galleryLoadedOnce = true;
      const gridEl = document.getElementById('galleryGrid');
      const emptyEl = document.getElementById('galleryEmpty');
      const moreBtn = document.getElementById('loadMoreBtn');

      if (reset) gridEl.innerHTML = '';

      const entries = (res && res.entries) || [];
      galleryTotal = (res && res.total) || 0;

      if (galleryOffset === 0 && entries.length === 0) {
        emptyEl.style.display = 'block';
        moreBtn.style.display = 'none';
        return;
      }
      emptyEl.style.display = 'none';

      entries.forEach(e => {
        gridEl.appendChild(buildThumb(e));
      });

      galleryOffset += entries.length;

      moreBtn.disabled = false;
      moreBtn.textContent = '더 보기';
      moreBtn.style.display = (galleryOffset < galleryTotal) ? 'block' : 'none';
    }

    // ---------- 우리 웨딩사진 (신랑신부가 드라이브에 직접 올린 사진) ----------
    let coupleLoadedOnce = false;

    function loadCouplePhotos() {
      const gridEl = document.getElementById('coupleGrid');
      const emptyEl = document.getElementById('coupleEmpty');

      gridEl.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#7c93ad;font-size:13px;padding:20px 0;">불러오는 중...</div>';
      emptyEl.style.display = 'none';

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getCouplePhotos', data: {} })
      })
        .then(function(r) { return r.json(); })
        .then(function(res) {
          coupleLoadedOnce = true;
          gridEl.innerHTML = '';
          const entries = (res && res.entries) || [];
          if (entries.length === 0) {
            emptyEl.style.display = 'block';
            return;
          }
          emptyEl.style.display = 'none';
          entries.forEach(function(e) {
            gridEl.appendChild(buildThumb(e));
          });
        })
        .catch(function() {
          gridEl.innerHTML = '';
          emptyEl.style.display = 'block';
          emptyEl.textContent = '불러오기에 실패했습니다.';
        });
    }

    function buildThumb(e) {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.onclick = () => openModal(e);

      if (e.fileId && e.mimeType) {
        // 가벼운 썸네일만 로드 (원본 아님) -> 속도 개선
        const thumbUrl = 'https://drive.google.com/thumbnail?id=' + e.fileId + '&sz=w300';
        const img = document.createElement('img');
        img.src = thumbUrl;
        img.loading = 'lazy';
        div.appendChild(img);
        if (e.mimeType.startsWith('video/')) {
          const play = document.createElement('div');
          play.className = 'play-icon';
          div.appendChild(play);
        }
      } else {
        div.classList.add('no-media');
        const msg = document.createElement('div');
        msg.className = 'msg-preview';
        msg.textContent = e.message || '';
        div.appendChild(msg);
      }

      // 신랑신부 사진(name 속성 없음)에는 이름표를 안 붙임
      if (typeof e.name !== 'undefined') {
        const tag = document.createElement('div');
        tag.className = 'name-tag';
        tag.textContent = e.name || '익명';
        div.appendChild(tag);
      }

      return div;
    }

    function openModal(e) {
      if (!e) return;

      const mediaEl = document.getElementById('modalMedia');
      mediaEl.innerHTML = '';

      if (e.fileId && e.mimeType) {
        if (e.mimeType.startsWith('image/')) {
          const img = document.createElement('img');
          // 모달에서는 원본 화질 로드 (한 번에 하나만 열리므로 속도 문제 없음)
          img.src = 'https://drive.google.com/thumbnail?id=' + e.fileId + '&sz=w2000';
          mediaEl.appendChild(img);
        } else if (e.mimeType.startsWith('video/')) {
          const iframe = document.createElement('iframe');
          iframe.src = 'https://drive.google.com/file/d/' + e.fileId + '/preview';
          iframe.allow = 'autoplay';
          mediaEl.appendChild(iframe);
        }
      }

      const modalBody = document.getElementById('modalBody');
      if (typeof e.name !== 'undefined') {
        // 게스트가 올린 항목: 이름/메시지/시간 표시
        modalBody.style.display = 'block';
        document.getElementById('modalName').textContent = e.name || '익명';
        document.getElementById('modalMsg').textContent = e.message || '';
        document.getElementById('modalTime').textContent = e.time
          ? new Date(e.time).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
          : '';
      } else {
        // 신랑신부 사진: 텍스트 정보 없이 사진만 표시
        modalBody.style.display = 'none';
      }

      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('modalMedia').innerHTML = '';
    }
  </script>
</body>
</html>
