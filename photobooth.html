<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>시연🤍영중 - 포토부스</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    height: 100%;
    background: #14263f;
    overflow: hidden;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .screen {
    display: none;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 24px;
    text-align: center;
  }
  .screen.active { display: flex; }

  /* 인트로 */
  #introTitle {
    font-size: 34px;
    color: #fff;
    font-weight: 800;
    margin-bottom: 10px;
  }
  #introSub {
    font-size: 16px;
    color: #cfe0f2;
    line-height: 1.7;
    margin-bottom: 40px;
  }
  .bigBtn {
    padding: 20px 48px;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    background: #3f6fa8;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .smallBtn {
    margin-top: 18px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 700;
    color: #cfe0f2;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    cursor: pointer;
  }

  /* 촬영 화면 */
  #cameraWrap {
    position: relative;
    width: 90vw;
    max-width: 640px;
    aspect-ratio: 4/3;
    border-radius: 20px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
  }
  #countdown {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 120px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  #shotProgress {
    margin-top: 24px;
    display: flex;
    gap: 10px;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .dot.done { background: #3f6fa8; }
  #camStatus {
    color: #cfe0f2;
    font-size: 15px;
    margin-top: 18px;
  }

  /* 리뷰 화면 */
  #reviewCanvasWrap {
    max-height: 62vh;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    margin-bottom: 20px;
  }
  #reviewCanvasWrap canvas {
    display: block;
    max-height: 62vh;
    width: auto;
  }
  #msgInput {
    width: 90vw;
    max-width: 420px;
    padding: 14px 16px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    margin-bottom: 18px;
    min-height: 60px;
  }
  .btnRow { display: flex; gap: 14px; }

  /* 업로드/완료 화면 */
  #doneTitle { font-size: 26px; color: #fff; font-weight: 800; margin-bottom: 8px; }
  #doneSub { font-size: 15px; color: #cfe0f2; margin-bottom: 28px; }
  #qrWrap {
    background: #fff;
    padding: 18px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  #qrWrap img { width: 220px; height: 220px; display: block; }

  #spinner {
    width: 52px; height: 52px;
    border: 5px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="app">

    <!-- 1. 인트로 -->
    <div class="screen active" id="screenIntro">
      <div id="introTitle">📸 포토부스</div>
      <div id="introSub">시연🤍영중의 결혼을 축하하며<br>네 컷 사진을 남겨보세요!<br>인쇄 없이 QR로 바로 가져가실 수 있어요.</div>
      <button class="bigBtn" onclick="startCamera()">촬영 시작하기</button>
    </div>

    <!-- 2. 촬영 -->
    <div class="screen" id="screenCamera">
      <div id="cameraWrap">
        <video id="video" autoplay playsinline muted></video>
        <div id="flash"></div>
        <div id="countdown"></div>
      </div>
      <div id="shotProgress">
        <div class="dot" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
      </div>
      <div id="camStatus">준비되면 화면을 눌러 시작하세요</div>
    </div>

    <!-- 3. 리뷰 + 메시지 -->
    <div class="screen" id="screenReview">
      <div id="reviewCanvasWrap"><canvas id="finalCanvas"></canvas></div>
      <textarea id="msgInput" placeholder="사진과 함께 남길 짧은 메시지 (선택)"></textarea>
      <div class="btnRow">
        <button class="smallBtn" onclick="retake()">다시 찍기</button>
        <button class="bigBtn" onclick="uploadPhoto()">완료하고 QR 받기</button>
      </div>
    </div>

    <!-- 4. 업로드 중 -->
    <div class="screen" id="screenUploading">
      <div id="spinner"></div>
      <div id="doneSub">사진을 저장하고 있어요...</div>
    </div>

    <!-- 5. 완료 (QR) -->
    <div class="screen" id="screenDone">
      <div id="doneTitle">완성됐어요! 🎉</div>
      <div id="doneSub">아래 QR을 스캔해서 사진을 가져가세요</div>
      <div id="qrWrap"><img id="qrImg" src="" alt="다운로드 QR"></div>
      <button class="smallBtn" onclick="resetAll()">다음 손님 - 처음으로</button>
    </div>

  </div>

  <script>
    // Apps Script 백엔드 API 주소 (방명록과 동일)
    var API_URL = 'https://script.google.com/macros/s/AKfycbylFNXIVWUEpZSjDnR1fW8Vx0G9xhRe1K23fXLP-X99HSq-vA9Ph6SBZM2oaX1a7I3B/exec';

    var videoEl = document.getElementById('video');
    var stream = null;
    var shots = [];          // 캡처된 4장의 <canvas> 각각의 imageData(dataURL 아님, ImageBitmap 대용으로 canvas 자체 보관)
    var finalCanvas = document.getElementById('finalCanvas');

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
    }

    function startCamera() {
      showScreen('screenCamera');
      shots = [];
      updateDots();

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } }, audio: false })
        .then(function(s) {
          stream = s;
          videoEl.srcObject = s;
          document.getElementById('camStatus').textContent = '준비되면 화면을 눌러 시작하세요';
          document.getElementById('cameraWrap').onclick = beginSequence;
        })
        .catch(function() {
          document.getElementById('camStatus').textContent = '카메라 접근이 거부됐어요. 브라우저 설정에서 카메라 권한을 허용해주세요.';
        });
    }

    function updateDots() {
      for (var i = 0; i < 4; i++) {
        document.getElementById('dot' + i).classList.toggle('done', i < shots.length);
      }
    }

    var sequenceRunning = false;
    function beginSequence() {
      if (sequenceRunning) return;
      sequenceRunning = true;
      document.getElementById('cameraWrap').onclick = null;
      shots = [];
      updateDots();
      takeShotWithCountdown(1);
    }

    function takeShotWithCountdown(shotNum) {
      var countdownEl = document.getElementById('countdown');
      document.getElementById('camStatus').textContent = shotNum + ' / 4 컷 촬영 준비';
      var n = 3;
      countdownEl.textContent = n;
      var timer = setInterval(function() {
        n--;
        if (n > 0) {
          countdownEl.textContent = n;
        } else {
          clearInterval(timer);
          countdownEl.textContent = '';
          capture();
          if (shotNum < 4) {
            setTimeout(function() { takeShotWithCountdown(shotNum + 1); }, 1200);
          } else {
            setTimeout(finishCapture, 600);
          }
        }
      }, 700);
    }

    function capture() {
      var vw = videoEl.videoWidth || 1280;
      var vh = videoEl.videoHeight || 960;
      var c = document.createElement('canvas');
      c.width = vw;
      c.height = vh;
      var ctx = c.getContext('2d');
      // 미리보기와 동일하게 좌우 반전(셀카 느낌)해서 캡처
      ctx.translate(vw, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(videoEl, 0, 0, vw, vh);
      shots.push(c);
      updateDots();

      var flashEl = document.getElementById('flash');
      flashEl.style.transition = 'none';
      flashEl.style.opacity = '0.85';
      requestAnimationFrame(function() {
        flashEl.style.transition = 'opacity 0.4s ease';
        flashEl.style.opacity = '0';
      });
    }

    function finishCapture() {
      sequenceRunning = false;
      if (stream) {
        stream.getTracks().forEach(function(t) { t.stop(); });
        stream = null;
      }
      composeFrame();
      showScreen('screenReview');
    }

    function retake() {
      document.getElementById('msgInput').value = '';
      startCamera();
    }

    // 이미지를 지정한 영역에 cover 방식으로 그려주는 헬퍼
    function drawCover(ctx, img, x, y, w, h) {
      var iw = img.width, ih = img.height;
      var ir = iw / ih, tr = w / h;
      var sx, sy, sw, sh;
      if (ir > tr) {
        sh = ih;
        sw = ih * tr;
        sx = (iw - sw) / 2;
        sy = 0;
      } else {
        sw = iw;
        sh = iw / tr;
        sx = 0;
        sy = (ih - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function roundRectPath(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function composeFrame() {
      var FRAME_W = 640;
      var PADDING = 28;
      var GAP = 14;
      var HEADER_H = 96;
      var FOOTER_H = 56;
      var slotW = FRAME_W - PADDING * 2;
      var slotH = Math.round(slotW * 0.7);
      var FRAME_H = HEADER_H + slotH * 4 + GAP * 3 + PADDING + FOOTER_H;

      finalCanvas.width = FRAME_W;
      finalCanvas.height = FRAME_H;
      var ctx = finalCanvas.getContext('2d');

      // 배경
      var grad = ctx.createLinearGradient(0, 0, 0, FRAME_H);
      grad.addColorStop(0, '#f4f8fc');
      grad.addColorStop(1, '#e4edf7');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, FRAME_W, FRAME_H);

      // 헤더
      ctx.fillStyle = '#2d4468';
      ctx.textAlign = 'center';
      ctx.font = '700 30px -apple-system, sans-serif';
      ctx.fillText('시연🤍영중', FRAME_W / 2, 54);
      ctx.font = '400 14px -apple-system, sans-serif';
      ctx.fillStyle = '#4a678f';
      ctx.fillText('WE ARE GETTING MARRIED', FRAME_W / 2, 78);

      // 4컷 사진
      var y = HEADER_H;
      for (var i = 0; i < 4; i++) {
        var img = shots[i];
        roundRectPath(ctx, PADDING, y, slotW, slotH, 10);
        ctx.save();
        ctx.clip();
        if (img) drawCover(ctx, img, PADDING, y, slotW, slotH);
        ctx.restore();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        roundRectPath(ctx, PADDING, y, slotW, slotH, 10);
        ctx.stroke();
        y += slotH + GAP;
      }

      // 푸터
      var dateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
      ctx.fillStyle = '#7c93ad';
      ctx.font = '400 13px -apple-system, sans-serif';
      ctx.fillText(dateStr, FRAME_W / 2, FRAME_H - 24);
    }

    function uploadPhoto() {
      showScreen('screenUploading');
      var message = document.getElementById('msgInput').value.trim();

      finalCanvas.toBlob(function(blob) {
        var reader = new FileReader();
        reader.onload = function() {
          var base64 = reader.result.split(',')[1];
          fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'submitPhotobooth',
              data: {
                message: message,
                fileData: base64,
                fileName: 'photobooth_' + Date.now() + '.jpg'
              }
            })
          })
            .then(function(r) { return r.json(); })
            .then(function(res) {
              if (res && res.success) {
                showQr(res.viewUrl);
              } else {
                alert('저장에 실패했어요: ' + ((res && res.error) || '알 수 없는 오류'));
                showScreen('screenReview');
              }
            })
            .catch(function() {
              alert('저장에 실패했어요. 인터넷 연결을 확인해주세요.');
              showScreen('screenReview');
            });
        };
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.88);
    }

    function showQr(viewUrl) {
      var qrImg = document.getElementById('qrImg');
      qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=440x440&data=' + encodeURIComponent(viewUrl);
      showScreen('screenDone');
    }

    function resetAll() {
      shots = [];
      document.getElementById('msgInput').value = '';
      showScreen('screenIntro');
    }
  </script>
</body>
</html>
